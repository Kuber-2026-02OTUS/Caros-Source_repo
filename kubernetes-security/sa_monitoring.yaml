---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: monitoring
  namespace: homework
---
apiVersion: rbac.authorization.k8s.io/v1 # Роль доступа с правилами
kind: ClusterRole
metadata:
  name: monitoring-metrics-access
rules:
- nonResourceURLs:
  - "/metrics"
  verbs:
  - "get"
---
apiVersion: rbac.authorization.k8s.io/v1 # Наделение аккаунта нужной ролью
kind: ClusterRoleBinding
metadata:
  name: monitoring-metrics-binding
subjects:
- kind: ServiceAccount
  name: monitoring
  namespace: homework
roleRef:
  kind: ClusterRole
  name: monitoring-metrics-access
  apiGroup: rbac.authorization.k8s.io